<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéNumber</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>

<body>
    <div id="guideButton">?</div>
    <dialog id="howToPlayDialog" class="overlayMenu">
        <button class="guideCloseButton" id="guideCloseButton" type="button" aria-label="Close">
            <svg width="90px" height="40px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
                <path fill="var(--bg-menu)"
                    d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z">
                </path>
            </svg></button>
        <div class="guideDialogContent">
            <h3 data-loc="guideDialogTitle">Comment jouer</h3>
            <p data-loc="guideExplaination">Devinez le numéro du pokédex du pokémon affiché.</p>
            <p id="guideDialogExampleText" data-loc="guideDialogExampleText">EXEMPLE</p>
            <div class="guideExample">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"
                    alt="">
                <p class="guideExampleName">Pikachu</p>
                <p class="guideExampleAnswer">25</p>
            </div>
            <div class="guideModes">
                <svg width="30px" height="30px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
                    <path class="guideCog" stroke="#000000" stroke-linejoin="round" stroke-width="2"
                        d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    <path class="guideCog" stroke="#000000" stroke-linejoin="round" stroke-width="2"
                        d="M10.47 4.32c.602-1.306 2.458-1.306 3.06 0l.218.473a1.684 1.684 0 0 0 2.112.875l.49-.18c1.348-.498 2.66.814 2.162 2.163l-.18.489a1.684 1.684 0 0 0 .875 2.112l.474.218c1.305.602 1.305 2.458 0 3.06l-.474.218a1.684 1.684 0 0 0-.875 2.112l.18.49c.498 1.348-.814 2.66-2.163 2.162l-.489-.18a1.684 1.684 0 0 0-2.112.875l-.218.473c-.602 1.306-2.458 1.306-3.06 0l-.218-.473a1.684 1.684 0 0 0-2.112-.875l-.49.18c-1.348.498-2.66-.814-2.163-2.163l.181-.489a1.684 1.684 0 0 0-.875-2.112l-.474-.218c-1.305-.602-1.305-2.458 0-3.06l.474-.218a1.684 1.684 0 0 0 .875-2.112l-.18-.49c-.498-1.348.814-2.66 2.163-2.163l.489.181a1.684 1.684 0 0 0 2.112-.875l.218-.474Z" />
                </svg>
                <p data-loc="guideGameModesText">D'autres modes de jeu sont disponibles dans le menu.</p>
            </div>
        </div>
    </dialog>
    <div class="all">
        <p id="score" class="text">0/0</p>
        <div class="poke">
            <img id="img" src="" alt="Pokémon sprite" fetchpriority="high">
            <p id="textInfo" class="text"> </p>
        </div>
        <div class="ans">
            <input type="number" name="q" id="input" autofocus placeholder="n°..." list="pokemonNames">
            <datalist id="pokemonNames"></datalist>
        </div>
        <div>
            <p id="solution" class="text"></p>
        </div>
    </div>
    <div class="menuIcon">
        <svg width="800px" height="800px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
            <path class="cog" stroke="#000000" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            <path class="cog" stroke="#000000" stroke-linejoin="round" stroke-width="2"
                d="M10.47 4.32c.602-1.306 2.458-1.306 3.06 0l.218.473a1.684 1.684 0 0 0 2.112.875l.49-.18c1.348-.498 2.66.814 2.162 2.163l-.18.489a1.684 1.684 0 0 0 .875 2.112l.474.218c1.305.602 1.305 2.458 0 3.06l-.474.218a1.684 1.684 0 0 0-.875 2.112l.18.49c.498 1.348-.814 2.66-2.163 2.162l-.489-.18a1.684 1.684 0 0 0-2.112.875l-.218.473c-.602 1.306-2.458 1.306-3.06 0l-.218-.473a1.684 1.684 0 0 0-2.112-.875l-.49.18c-1.348.498-2.66-.814-2.163-2.163l.181-.489a1.684 1.684 0 0 0-.875-2.112l-.474-.218c-1.305-.602-1.305-2.458 0-3.06l.474-.218a1.684 1.684 0 0 0 .875-2.112l-.18-.49c-.498-1.348.814-2.66 2.163-2.163l.489.181a1.684 1.684 0 0 0 2.112-.875l.218-.474Z" />
        </svg>
    </div>
    <div class="menu">
        <div class="panelMenuIcon">
            <svg width="800px" height="800px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
                <path class="cog2" stroke="#000000" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                <path class="cog2" stroke="#000000" stroke-linejoin="round" stroke-width="2"
                    d="M10.47 4.32c.602-1.306 2.458-1.306 3.06 0l.218.473a1.684 1.684 0 0 0 2.112.875l.49-.18c1.348-.498 2.66.814 2.162 2.163l-.18.489a1.684 1.684 0 0 0 .875 2.112l.474.218c1.305.602 1.305 2.458 0 3.06l-.474.218a1.684 1.684 0 0 0-.875 2.112l.18.49c.498 1.348-.814 2.66-2.163 2.162l-.489-.18a1.684 1.684 0 0 0-2.112.875l-.218.473c-.602 1.306-2.458 1.306-3.06 0l-.218-.473a1.684 1.684 0 0 0-2.112-.875l-.49.18c-1.348.498-2.66-.814-2.163-2.163l.181-.489a1.684 1.684 0 0 0-.875-2.112l-.474-.218c-1.305-.602-1.305-2.458 0-3.06l.474-.218a1.684 1.684 0 0 0 .875-2.112l-.18-.49c-.498-1.348.814-2.66 2.163-2.163l.489.181a1.684 1.684 0 0 0 2.112-.875l.218-.474Z" />
            </svg>
        </div>
        <div class="menuClose">
            <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="x" d="M19 5L5 19" stroke-width="2" stroke-linecap="round" />
                <path class="x" d="M5 5L19 19" stroke-width="2" stroke-linecap="round" />
            </svg>
        </div>
        <div class="menuContent">
            <div class="darkModeDiv">
                <button class="darkModeButton" id="darkModeButton">🌙</button>
            </div>
            <div class="boundaries">
                <div class="minDiv">
                    <label for="min" id="labelMin" data-loc="minimumId">Minimum</label>
                    <input type="number" name="min" id="min" min="1" max="1025" placeholder="1" class="boundaryInput">
                </div>
                <div class="maxDiv">
                    <label for="max" id="labelMax" data-loc="maximumId">Maximum</label>
                    <input type="number" name="max" id="max" min="1" max="1025" placeholder="1025"
                        class="boundaryInput">
                </div>
            </div>
            <div class="gameModeDiv">
                <div>
                    <input type="radio" name="mode" id="nameToNumber">
                    <label for="nameToNumber" data-loc="nameToNumber">Abc → #</label>
                </div>
                <div>
                    <input type="radio" name="mode" id="numberToName">
                    <label for="numberToName" data-loc="numberToName"># → Abc</label>
                </div>
                <div>
                    <input type="radio" name="mode" id="imageToName">
                    <label for="imageToName" data-loc="imageToName"># → Abc</label>
                </div>
            </div>
            <button id="restart">Recommencer</button>
            <div>
                <div>
                    <input type="checkbox" name="shinyShake" id="shinyShake">
                    <label for="shinyShake" data-loc="shakingToggle">Désactiver les tremblements</label>
                </div>
            </div>
            <div class="shinyStats">
                <div class="caughtShinies">
                    <p class="caughtShiniesNumber" id="caughtShiniesNumber"></p>
                    <p class="caughtShiniesTextSingular shinyText" id="caughtShiniesTextSingular"
                        data-loc="caughtShiniesTextSingular"> shiny attrapé</p>
                    <p class="caughtShiniesTextPlural shinyText" id="caughtShiniesTextPlural"
                        data-loc="caughtShiniesTextPlural"> shinys attrapés</p>
                </div>
                <div class="missedShinies">
                    <p class="missedShiniesNumber" id="missedShiniesNumber"></p>
                    <p class="missedShiniesTextSingular shinyText" id="missedShiniesTextSingular"
                        data-loc="missedShiniesTextSingular"> shiny loupé</p>
                    <p class="missedShiniesTextPlural shinyText" id="missedShiniesTextPlural"
                        data-loc="missedShiniesTextPlural"> shinys loupés</p>
                </div>
            </div>
            <div class="flags">
                <span class="fi fi-fr flag" id="fr"></span>
                <span class="fi fi-gb flag" id="en"></span>
                <span class="fi fi-de flag" id="de"></span>
                <span class="fi fi-es flag" id="es"></span>
                <span class="fi fi-it flag" id="it"></span>
                <span class="fi fi-jp flag" id="ja"></span>
            </div>
        </div>
    </div>
</body>

<script src="script.js" defer></script>

</html>
