<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dex</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="all">
        <p id="score" class="text">0/0</p>
        <div class="poke">
            <img id="img" src="" alt="">
            <p id="name" class="text"> </p>
        </div>
        <div class="ans">
            <input type="number" name="q" id="input" autofocus placeholder="Numéro..." onkeypress="keyPress(event)">
        </div>
        <div>
            <p id="answer" class="text"></p>
        </div>
    </div>
    <div class="menuIcon">
        <svg width="800px" height="800px" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
            <path class="cog" stroke="#000000" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            <path class="cog" stroke="#000000" stroke-linejoin="round" stroke-width="2"
                d="M10.47 4.32c.602-1.306 2.458-1.306 3.06 0l.218.473a1.684 1.684 0 0 0 2.112.875l.49-.18c1.348-.498 2.66.814 2.162 2.163l-.18.489a1.684 1.684 0 0 0 .875 2.112l.474.218c1.305.602 1.305 2.458 0 3.06l-.474.218a1.684 1.684 0 0 0-.875 2.112l.18.49c.498 1.348-.814 2.66-2.163 2.162l-.489-.18a1.684 1.684 0 0 0-2.112.875l-.218.473c-.602 1.306-2.458 1.306-3.06 0l-.218-.473a1.684 1.684 0 0 0-2.112-.875l-.49.18c-1.348.498-2.66-.814-2.163-2.163l.181-.489a1.684 1.684 0 0 0-.875-2.112l-.474-.218c-1.305-.602-1.305-2.458 0-3.06l.474-.218a1.684 1.684 0 0 0 .875-2.112l-.18-.49c-.498-1.348.814-2.66 2.163-2.163l.489.181a1.684 1.684 0 0 0 2.112-.875l.218-.474Z" />
        </svg>
    </div>
    <div class="menu">
        <div class="menuClose">
            <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path class="x" d="M19 5L5 19" stroke-width="2" stroke-linecap="round" />
                <path class="x" d="M5 5L19 19" stroke-width="2" stroke-linecap="round" />
            </svg>
        </div>
        <div class="menuContent">
            <div class="darkModeDiv">
                <button class="darkModeButton" id="darkModeButton">🌙</button>
            </div>
            <div class="boundaries">
                <div class="minDiv">
                    <label for="min" id="labelMin">Numéro minimum</label>
                    <input type="number" name="min" id="min" min="1" max="1025" placeholder="1">
                </div>
                <div class="maxDiv">
                    <label for="max" id="labelMax">Numéro maximum</label>
                    <input type="number" name="max" id="max" min="1" max="1025" placeholder="301">
                </div>
                <button id="ok">OK</button>
            </div>
        </div>
    </div>
</body>

<script src="script.js" defer></script>

</html>
